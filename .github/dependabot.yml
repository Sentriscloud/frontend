version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      next:
        patterns:
          - "next"
          - "@next/*"
          - "react"
          - "react-dom"
      tooling:
        patterns:
          - "typescript"
          - "@types/*"
          - "eslint*"
          - "@typescript-eslint/*"
          - "turbo"
      web3:
        patterns:
          - "viem"
          - "wagmi"
          - "@privy-io/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
